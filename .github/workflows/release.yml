# Creates a GitHub Release whenever a version tag (v*) is pushed.
# The release body is the matching section from CHANGELOG.md and the
# built mod jar is attached as an asset.

name: release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build
        run: ./gradlew build
      - name: extract changelog section
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 == "## Version " ver { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if ! grep -q '[^[:space:]]' RELEASE_NOTES.md; then
            echo "::error::No changelog section found for version $VERSION in CHANGELOG.md"
            exit 1
          fi
      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            build/libs/*.jar
            !build/libs/*-sources.jar
