# Done to increase the memory available to gradle.
org.gradle.jvmargs=-Xmx1G
org.gradle.parallel=true

# IntelliJ IDEA is not yet fully compatible with configuration cache, see: https://github.com/FabricMC/fabric-loom/issues/1349
org.gradle.configuration-cache=false

# Fabric Properties
# check these on https://fabricmc.net/develop
minecraft_version=26.1.2
loader_version=0.19.3
loom_version=1.17-SNAPSHOT
fabric_kotlin_version=1.13.13+kotlin.2.4.10

# Mod Properties
mod_version=1.4.0
maven_group=net.trilleo

# Dependencies
fabric_api_version=0.155.0+26.1.2
# cloth_config_version is what we compile against; cloth_config_min_version is the floor advertised in
# fabric.mod.json. Keep the floor loose: Hex auto-updates itself, so pinning a newer Cloth here would let the
# updater swap in a jar that refuses to launch on the user's existing Cloth install.
cloth_config_version=26.1.154
cloth_config_min_version=26.1
modmenu_version=18.0.0
